name: deployHuggingFace

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hugging Face Hub
        run: python -m pip install --upgrade huggingface_hub

      - name: Upload Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: pima5
          HF_SPACE: eyez
        run: |
          python <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = f"{os.environ['HF_USERNAME']}/{os.environ['HF_SPACE']}"
          api = HfApi(token=token)

          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              private=False,
              exist_ok=True,
          )

          api.upload_folder(
              repo_id=repo_id,
              repo_type="space",
              folder_path=".",
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  ".env",
                  "node_modules/*",
                  "dist/*",
              ],
          )
          print(f"Uploaded https://huggingface.co/spaces/{repo_id}")
          PY
